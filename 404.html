<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Munister Agency</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Georgia',serif;background:#f5f0ea;color:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
    .num{font-size:clamp(120px,20vw,200px);font-style:italic;line-height:1;color:#0a0a0a;opacity:.08;position:absolute}
    .inner{position:relative;z-index:1}
    h1{font-size:clamp(32px,6vw,64px);font-style:italic;font-weight:400;margin-bottom:16px}
    p{font-size:16px;color:#888;margin-bottom:40px;font-family:'DM Sans',sans-serif}
    a{display:inline-block;background:#0a0a0a;color:#fff;padding:14px 32px;font-family:sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;text-decoration:none}
    a:hover{background:#333}
  </style>
</head>
<body>
  <span class="num">404</span>
  <div class="inner">
    <h1>Сторінку не знайдено</h1>
    <p>Схоже, ця сторінка переїхала або не існує.</p>
    <a href="/">← На головну</a>
  </div>
</body>
</html>
